<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body oncontextmenu="return false;">
    <div class="game-container">
        <h1 class="title">Tic-Tac-Toe</h1>
        <div id="status-display" class="status player-x-turn">Player X turn</div>
        <div id="game-board" class="game-board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button id="reset-btn" class="reset-button">Reset Game</button>
    </div>
    <script>
        // Debug script to check if files loaded
        window.onload = function() {
            var style = document.getElementById('status-display');
            if (!style) {
                alert("Warning: The DOM might not be loading correctly.");
            } else {
                console.log("DOM loaded successfully.");
            }
        };
        
        // Check if script.js is loaded
        window.onerror = function(msg, url, lineNo, colNo, error) {
            alert("JavaScript Error: " + msg + " at " + url + ":" + lineNo);
        };
    </script>
    <script src="script.js"></script>
</body>
</html>
