<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Tic-Tac-Toe AI</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="game-container">
  <h1>3D Tic-Tac-Toe</h1>

  <div id="status-display" class="status"></div>

  <select id="difficulty-select">
    <option value="easy">Easy</option>
    <option value="medium" selected>Medium</option>
    <option value="hard">Hard/Expert</option>
  </select>

  <div class="rotation-controls">
    <label for="rotateX-slider">Rotate X:</label>
    <input type="range" id="rotateX-slider" min="-180" max="180" value="30">
    <label for="rotateY-slider">Rotate Y:</label>
    <input type="range" id="rotateY-slider" min="-180" max="180" value="45">
  </div>

  <div class="board-3d-container">
    <div class="cube" id="tic-tac-toe-cube"></div>
  </div>

  <button id="reset-btn">Reset Game</button>
</div>
<script src="script.js"></script>
</body>
</html>
