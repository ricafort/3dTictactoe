<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <h1>3D Tic-Tac-Toe</h1>
    <div class="status" id="status-display">Your turn (X)</div>
    
    <div class="controls">
      <select id="difficulty-select">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="explode-btn">Explode View</button>
      <button id="reset-btn">Reset Game</button>
    </div>

    <div class="board-3d-container">
      <div id="tic-tac-toe-cube" class="cube"></div>
    </div>
    
    <p class="instruction">Click to place X &bull; Drag to rotate the cube</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
