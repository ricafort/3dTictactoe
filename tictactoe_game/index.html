<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <h1>Tic-Tac-Toe</h1>
        <div class="score-board">
            <div class="player-score">Player (X): <span id="playerScore">0</span></div>
            <div class="ai-score">AI (O): <span id="aiScore">0</span></div>
        </div>
        <div id="gameStatus" class="game-status">Your Turn (X)</div>
        <div id="board" class="board">
            <!-- Cells will be generated by JavaScript -->
        </div>
        <button id="restartButton" class="restart-button">Restart Game</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
